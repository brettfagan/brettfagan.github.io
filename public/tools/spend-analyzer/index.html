<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spend Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --surface: #f6f7f9; --border: #e2e4e9; --border-light: #d0d3db;
    --text: #1a1b1e; --muted: #6b7280; --accent: #2563eb; --accent2: #0891b2;
    --danger: #dc2626; --warn: #d97706;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; font-size:13px; min-height:100vh; line-height:1.6; }
  header { padding:40px 48px 32px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:20px; }
  header h1 { font-family:'DM Mono',monospace; font-size:28px; font-weight:800; letter-spacing:-0.5px; color:var(--text); }
  header span { color:var(--muted); font-size:12px; }
  .main { display:grid; grid-template-columns:340px 1fr; min-height:calc(100vh - 89px); }

  /* SIDEBAR */
  .sidebar { border-right:1px solid var(--border); padding:20px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
  .sidebar-title { font-family:'DM Mono',monospace; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }

  .import-block { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; transition:border-color 0.2s; }
  .import-block.loaded { border-color:var(--accent); }
  .import-block-header { display:flex; align-items:center; justify-content:space-between; padding:7px 14px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; transition:background 0.15s; }
  .import-block-header:hover { background:rgba(0,0,0,0.03); }
  .block-label { font-family:'DM Mono',monospace; font-size:12px; font-weight:700; }
  .block-status { font-size:11px; color:var(--muted); }
  .block-status.ok { color:var(--accent); }
  .import-body { display:none; padding:14px; }
  .import-block.open .import-body { display:block; }

  .tabs { display:flex; border:1px solid var(--border-light); border-radius:5px; overflow:hidden; margin-bottom:12px; }
  .tab-btn { flex:1; background:transparent; border:none; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; font-weight:700; padding:7px 10px; cursor:pointer; transition:all 0.15s; }
  .tab-btn.active { background:var(--accent); color:#ffffff; }
  .tab-pane { display:none; }
  .tab-pane.active { display:block; }

  textarea { width:100%; background:var(--bg); border:1px solid var(--border-light); border-radius:4px; color:var(--text); font-family:'DM Mono',monospace; font-size:11px; padding:10px; resize:vertical; min-height:90px; outline:none; transition:border-color 0.2s; }
  textarea:focus { border-color:var(--accent2); }

  .drop-zone { border:2px dashed var(--border-light); border-radius:6px; padding:20px; text-align:center; cursor:pointer; transition:all 0.2s; color:var(--muted); font-size:12px; line-height:1.8; }
  .drop-zone:hover, .drop-zone.dragover { border-color:var(--accent2); background:rgba(8,145,178,0.04); color:var(--text); }
  .drop-zone input[type=file] { display:none; }
  .drop-icon { font-size:22px; margin-bottom:6px; }
  .csv-hint { margin-top:8px; font-size:10px; color:var(--muted); line-height:1.7; }

  .btn { margin-top:10px; width:100%; background:var(--accent); color:#ffffff; border:none; border-radius:4px; font-family:'DM Mono',monospace; font-size:12px; font-weight:700; padding:8px 12px; cursor:pointer; letter-spacing:0.5px; transition:opacity 0.15s; }
  .btn:hover { opacity:0.85; }
  .btn-ghost { background:transparent; border:1px solid var(--border-light); color:var(--muted); margin-top:6px; }
  .btn-ghost:hover { color:var(--text); opacity:1; }
  .err { color:var(--danger); font-size:11px; padding:4px 0; min-height:18px; }

  .analyze-btn { background:var(--accent); color:#ffffff; border:none; border-radius:6px; font-family:'DM Mono',monospace; font-size:13px; font-weight:800; padding:12px; cursor:pointer; width:100%; transition:all 0.15s; }
  .analyze-btn:disabled { opacity:0.3; cursor:default; }
  .analyze-btn:not(:disabled):hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(37,99,235,0.25); }

  .start-over-btn { background:transparent; border:1px solid var(--border-light); border-radius:6px; color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; font-weight:700; padding:10px; cursor:pointer; width:100%; transition:all 0.15s; letter-spacing:0.5px; }
  .start-over-btn:hover { border-color:var(--danger); color:var(--danger); }
  .sidebar-footer { margin-top:16px; padding-top:12px; border-top:1px solid var(--border); color:var(--muted); font-size:11px; line-height:1.9; }

  /* CONTENT */
  .content { padding:28px 36px; overflow-y:auto; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:var(--muted); text-align:center; }
  .empty-icon { font-size:40px; }

  .stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:16px; margin-bottom:32px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px 20px; }
  .stat-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .stat-value { font-family:'DM Mono',monospace; font-size:24px; font-weight:800; color:var(--accent); }  .stat-sub { font-size:11px; color:var(--muted); margin-top:4px; }

  .section-title { font-family:'DM Mono',monospace; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }

  .categories { margin-bottom:36px; }
  .category-row { display:grid; grid-template-columns:200px 1fr 90px 80px; align-items:center; gap:16px; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; border-radius:4px; }
  .category-row:hover { background:rgba(0,0,0,0.025); padding:10px 8px; margin:0 -8px; }
  .cat-name { font-family:'DM Mono',monospace; font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cat-bar-wrap { background:var(--surface); border-radius:2px; height:6px; overflow:hidden; }
  .cat-bar { height:100%; border-radius:2px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1); }
  .subcat-panel { overflow:hidden; max-height:0; transition:max-height 0.35s ease; }
  .subcat-panel.open { max-height:600px; }
  .subcat-row { display:grid; grid-template-columns:200px 1fr 90px 80px; align-items:center; gap:16px; padding:6px 0 6px 16px; border-bottom:1px solid var(--border); cursor:pointer; }
  .subcat-row:hover { background:rgba(0,0,0,0.025); }
  .subcat-name { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .subcat-total { font-family:'DM Mono',monospace; font-size:11px; font-weight:600; text-align:right; }
  .subcat-count { font-size:10px; color:var(--muted); text-align:right; }
  .cat-total { text-align:right; font-weight:500; }
  .cat-count { text-align:right; color:var(--muted); font-size:11px; }

  .table-controls { display:flex; gap:10px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
  .search-input { background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text); font-family:'DM Mono',monospace; font-size:12px; padding:7px 12px; outline:none; flex:1; min-width:180px; transition:border-color 0.2s; }
  .search-input:focus { border-color:var(--accent2); }
  select { background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text); font-family:'DM Mono',monospace; font-size:12px; padding:7px 12px; outline:none; cursor:pointer; }

  table { width:100%; border-collapse:collapse; }
  tbody tr:nth-child(even) { background:#f7f8fa; }
  th { font-family:'DM Mono',monospace; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); text-align:left; padding:8px 12px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap; }
  th:hover { color:var(--text); }
  td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:hover td { background:rgba(0,0,0,0.02); }
  .td-date { color:var(--muted); white-space:nowrap; }
  .td-merchant { font-weight:500; max-width:260px; }
  .merchant-cell { display:flex; align-items:center; gap:7px; min-width:0; width:100%; }
  .merchant-logo { width:20px; height:20px; border-radius:4px; object-fit:contain; flex-shrink:0; background:var(--surface); border:1px solid var(--border); }
  .merchant-logo-placeholder { width:20px; height:20px; border-radius:4px; flex-shrink:0; display:inline-block; background:var(--surface); border:1px solid var(--border); }
  .merchant-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  .td-amount { text-align:right; font-weight:500; white-space:nowrap; }
  .badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:3px; border:1px solid var(--border-light); white-space:nowrap; }
  .channel-tag { display:inline-block; font-size:9px; padding:1px 5px; border-radius:3px; background:var(--surface); border:1px solid var(--border-light); color:var(--muted); margin-left:5px; vertical-align:middle; white-space:nowrap; }
  .low-confidence { font-size:10px; color:#e67e22; margin-left:4px; font-weight:700; cursor:default; position:relative; top:-2px; }
  .pending-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--warn); margin-right:6px; flex-shrink:0; }

  .results-section { animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  /* Transaction detail modal */
  #tx-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:900; animation:fadeOverlay 0.2s ease; }
  @keyframes fadeOverlay { from{opacity:0} to{opacity:1} }
  #tx-modal { position:fixed; inset:0; z-index:901; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  #tx-modal-inner { background:var(--bg); border:1px solid var(--border); border-radius:12px; width:520px; max-width:calc(100vw - 32px); max-height:calc(100vh - 48px); overflow-y:auto; pointer-events:all; animation:slideModal 0.22s cubic-bezier(0.16,1,0.3,1); box-shadow:0 20px 60px rgba(0,0,0,0.18); position:relative; }
  @keyframes slideModal { from{opacity:0;transform:translateY(16px) scale(0.98)} to{opacity:1;transform:none} }
  .tx-modal-close { position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; line-height:1; padding:4px 6px; border-radius:4px; }
  .tx-modal-close:hover { color:var(--text); background:var(--surface); }
  .tx-modal-header { display:flex; align-items:center; gap:14px; padding:24px 24px 18px; border-bottom:1px solid var(--border); }
  .tx-modal-logo { width:48px; height:48px; border-radius:10px; object-fit:contain; background:var(--surface); border:1px solid var(--border); flex-shrink:0; }
  .tx-modal-logo-placeholder { width:48px; height:48px; border-radius:10px; background:var(--surface); border:1px solid var(--border); flex-shrink:0; }
  .tx-modal-title { min-width:0; }
  .tx-modal-merchant { font-size:18px; font-weight:800; line-height:1.2; word-break:break-word; }
  .tx-modal-amount { font-size:14px; font-weight:700; margin-top:4px; }
  .tx-modal-amount.credit { color:var(--accent2); }
  .tx-modal-body { padding:20px 24px 24px; display:flex; flex-direction:column; gap:20px; }
  .tx-modal-section { display:flex; flex-direction:column; gap:8px; }
  .tx-modal-section-title { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding-bottom:6px; border-bottom:1px solid var(--border); }
  .tx-modal-row { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; font-size:12px; }
  .tx-modal-label { color:var(--muted); white-space:nowrap; flex-shrink:0; }
  .tx-modal-value { text-align:right; word-break:break-word; font-weight:500; }
  .tx-modal-value a { color:var(--accent); text-decoration:none; }
  .tx-modal-value a:hover { text-decoration:underline; }
  .tx-modal-badge { display:inline-block; font-size:10px; padding:2px 8px; border-radius:3px; border:1px solid var(--border-light); }
  .tx-modal-pending { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--warn); font-weight:700; }
  .tx-modal-counterparty { display:flex; align-items:center; gap:10px; padding:8px; background:var(--surface); border-radius:6px; border:1px solid var(--border); }
  .tx-modal-cp-logo { width:28px; height:28px; border-radius:6px; object-fit:contain; background:var(--bg); border:1px solid var(--border); flex-shrink:0; }
  .tx-modal-cp-info { min-width:0; }
  .tx-modal-cp-name { font-size:12px; font-weight:600; }
  .tx-modal-cp-type { font-size:10px; color:var(--muted); margin-top:1px; }
  tbody tr { cursor:pointer; }
</style>
</head>

      ✓ JSON and CSV both supported<br>

    <div class="empty-state">
      <div class="empty-icon">◈</div>

<script>
const CARDS = [
  { id:'fidelity', label:'Fidelity / ELAN', sub:'' },
  { id:'barclays', label:'Barclays', sub:'2 cards' },
  { id:'verizon', label:'Verizon Visa', sub:'' },
  { id:'chase', label:'Chase', sub:'' },
  { id:'other', label:'Other Card', sub:'' },
];

const CAT_COLORS = {
  'FOOD_AND_DRINK':'#059669','TRANSPORTATION':'#60d4f0','RENT_AND_UTILITIES':'#f0b860',
  'GENERAL_MERCHANDISE':'#b060f0','MEDICAL':'#f06060','ENTERTAINMENT':'#0891b2',
  'TRAVEL':'#f060b8','PERSONAL_CARE':'#d97706','GENERAL_SERVICES':'#8060f0',
};

const EXCLUDED = ['LOAN_PAYMENTS', 'INCOME'];

let loadedData = {};
let sortCol = 'date', sortDir = -1;

// Build slots
const slotsEl = document.getElementById('slots');
CARDS.forEach(card => {
  const el = document.createElement('div');
  el.className = 'import-block';
  el.id = 'block-' + card.id;
  el.innerHTML = `
    <div class="import-block-header" onclick="toggleBlock('${card.id}')">
      <span class="block-label">${card.label}${card.sub ? ' <span style="font-weight:400;color:var(--muted);font-size:11px">' + card.sub + '</span>' : ''}</span>
      <span class="block-status" id="status-${card.id}">no data</span>
    </div>
    <div class="import-body">
      <div class="tabs">
        <button class="tab-btn active" id="tab-json-${card.id}" onclick="switchTab(event,'${card.id}','json')">Plaid JSON File</button>
        <button class="tab-btn" id="tab-csv-${card.id}" onclick="switchTab(event,'${card.id}','csv')">CSV Upload</button>
      </div>
      <div class="tab-pane active" id="pane-json-${card.id}">
        <div class="drop-zone" id="dz-json-${card.id}"
          onclick="document.getElementById('fi-json-${card.id}').click()"
          ondragover="dzOver(event,'json-${card.id}')" ondragleave="dzLeave('json-${card.id}')" ondrop="dzDropJSON(event,'${card.id}')">
          <input type="file" id="fi-json-${card.id}" accept=".txt,.json" onchange="loadJSONFile('${card.id}',this.files[0])">
          <div class="drop-icon">⬆</div>
          <div>Drop .txt or .json file or click to browse</div>
        </div>
        <div class="err" id="err-json-${card.id}"></div>
      </div>
      <div class="tab-pane" id="pane-csv-${card.id}">
        <div class="drop-zone" id="dz-${card.id}"
          onclick="document.getElementById('fi-${card.id}').click()"
          ondragover="dzOver(event,'${card.id}')" ondragleave="dzLeave('${card.id}')" ondrop="dzDrop(event,'${card.id}')">
          <input type="file" id="fi-${card.id}" accept=".csv" onchange="loadCSVFile('${card.id}',this.files[0])">
          <div class="drop-icon">⬆</div>
          <div>Drop CSV or click to browse</div>
        </div>
        <div class="csv-hint">Accepts Plaid, Mint, Chase, Capital One, or any CSV with date, merchant/description, amount columns.</div>
        <div class="err" id="err-csv-${card.id}"></div>
      </div>
      <button class="btn btn-ghost" onclick="clearCard('${card.id}')">Clear</button>
    </div>`;
  slotsEl.appendChild(el);
});

function toggleBlock(id) { document.getElementById('block-'+id).classList.toggle('open'); }

function switchTab(e, cardId, tab) {
  e.stopPropagation();
  ['json','csv'].forEach(t => {
    document.getElementById('tab-'+t+'-'+cardId).classList.toggle('active', t===tab);
    document.getElementById('pane-'+t+'-'+cardId).classList.toggle('active', t===tab);
  });
}

// JSON
function dzDropJSON(e, id) {
  e.preventDefault();
  dzLeave('json-'+id);
  const f = e.dataTransfer.files[0];
  if (f) loadJSONFile(id, f);
}

function loadJSONFile(id, file) {
  if (!file) return;
  const errEl = document.getElementById('err-json-'+id);
  errEl.textContent = '';
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result.trim());
      if (!Array.isArray(data.transactions)) throw new Error('Missing "transactions" array — check this is a Plaid /transactions/get response.');
      setCard(id, data.transactions.map(normPlaid));
    } catch(e) { errEl.textContent = '✗ ' + e.message; }
  };
  reader.readAsText(file);
}

function normPlaid(tx) {
  return {
    date: tx.date,
    merchant: tx.merchant_name || tx.name || '—',
    logo_url: tx.logo_url || '',
    website: tx.website || '',
    payment_channel: tx.payment_channel || '',
    amount: tx.amount,
    cat: tx.personal_finance_category?.primary || 'OTHER',
    cat_detail: tx.personal_finance_category?.detailed || '',
    cat_confidence: tx.personal_finance_category?.confidence_level || '',
    pending: tx.pending || false,
    authorized_date: tx.authorized_date || '',
    authorized_datetime: tx.authorized_datetime || '',
    datetime: tx.datetime || '',
    location: tx.location || null,
    transaction_id: tx.transaction_id || '',
    account_id: tx.account_id || '',
    counterparty: Array.isArray(tx.counterparties) ? tx.counterparties : [],
    source: 'plaid',
  };
}

// CSV
function dzOver(e, id) { e.preventDefault(); document.getElementById('dz-'+id).classList.add('dragover'); }
function dzLeave(id) { document.getElementById('dz-'+id).classList.remove('dragover'); }
function dzDrop(e, id) { e.preventDefault(); dzLeave(id); const f = e.dataTransfer.files[0]; if (f) loadCSVFile(id, f); }

function loadCSVFile(id, file) {
  if (!file) return;
  const errEl = document.getElementById('err-csv-'+id);
  errEl.textContent = '';
  const reader = new FileReader();
  reader.onload = ev => {
    try { setCard(id, parseCSV(ev.target.result)); }
    catch(ex) { errEl.textContent = '✗ ' + ex.message; }
  };
  reader.readAsText(file);
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) throw new Error('CSV appears empty.');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase());

  const find = (...keys) => { for (const k of keys) { const i = headers.findIndex(h => h.includes(k)); if (i>=0) return i; } return -1; };
  const iDate   = (() => { const i = headers.indexOf('transaction date'); return i >= 0 ? i : find('date','trans date'); })();
  const iDesc   = find('description','merchant','name','payee','memo');
  const iAmount = find('amount','debit','charge');
  const iCat    = find('category');
  const iType   = find('type');

  if (iDate < 0) throw new Error('No date column found.');
  if (iDesc < 0) throw new Error('No merchant/description column found.');
  if (iAmount < 0) throw new Error('No amount column found.');

  const txns = [];
  for (let i = 1; i < lines.length; i++) {
    const row = splitRow(lines[i]);
    if (row.length < 2) continue;
    const rawDate = clean(row[iDate]);
    const rawDesc = clean(row[iDesc]);
    const rawAmt  = clean(row[iAmount] || '').replace(/[$,]/g,'');
    const rawCat  = iCat >= 0 ? clean(row[iCat]) : '';
    const rawType = iType >= 0 ? clean(row[iType]).toLowerCase() : '';
    if (!rawDate || !rawAmt) continue;
    const amount = parseFloat(rawAmt);
    if (isNaN(amount)) continue;
    if (rawType === 'payment') continue;
    const normalizedAmount = rawType === 'sale' ? Math.abs(amount) : rawType === 'return' ? -Math.abs(amount) : amount;
    txns.push({ date:normDate(rawDate), merchant:rawDesc||'—', amount:normalizedAmount, cat:guessCat(rawCat), cat_detail:rawCat, pending:false, source:'csv' });
  }

  if (!txns.length) throw new Error('No valid rows found. Check your CSV format.');

  if (iType < 0) {
    const nonZero = txns.filter(r => r.amount !== 0);
    if (nonZero.filter(r => r.amount < 0).length > nonZero.length / 2) {
      txns.forEach(t => t.amount = -t.amount);
    }
  }

  return txns;
}

function clean(s) { return (s||'').replace(/^"|"$/g,'').trim(); }

function splitRow(line) {
  const res=[]; let cur='', inQ=false;
  for (const c of line) {
    if (c==='"') inQ=!inQ;
    else if (c===',' && !inQ) { res.push(cur); cur=''; }
    else cur+=c;
  }
  res.push(cur); return res;
}

function normDate(d) {
  if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  const m = d.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  return m ? `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}` : d;
}

function guessCat(raw) {
  if (!raw) return 'OTHER';
  const r = raw.toUpperCase();
  if (/FOOD|DINING|RESTAURANT|GROCERY|GROC|COFFEE|CAFE/.test(r)) return 'FOOD_AND_DRINK';
  if (/GAS|FUEL|AUTO|UBER|LYFT|PARKING|TRANSIT/.test(r)) return 'TRANSPORTATION';
  if (/UTIL|PHONE|INTERNET|ELECTRIC|CABLE|WATER/.test(r)) return 'RENT_AND_UTILITIES';
  if (/MEDICAL|HEALTH|PHARMACY|DRUG|DOCTOR/.test(r)) return 'MEDICAL';
  if (/ENTERTAIN|MOVIE|SPORT|THEATER/.test(r)) return 'ENTERTAINMENT';
  if (/HOTEL|FLIGHT|AIRLINE|TRAVEL|AIRBNB/.test(r)) return 'TRAVEL';
  if (/SHOP|AMAZON|WALMART|TARGET|MERCHANDISE/.test(r)) return 'GENERAL_MERCHANDISE';
  if (/PERSONAL|SPA|SALON|GYM|FITNESS/.test(r)) return 'PERSONAL_CARE';
  return 'GENERAL_SERVICES';
}

// Shared
function setCard(id, txns) {
  loadedData[id] = txns;
  const s = document.getElementById('status-'+id);
  s.textContent = txns.length + ' txns';
  s.className = 'block-status ok';
  const b = document.getElementById('block-'+id);
  b.classList.add('loaded');
  b.classList.remove('open');
  updateBtn();
}

function clearCard(id) {
  delete loadedData[id];
  document.getElementById('ta-'+id).value = '';
  document.getElementById('err-json-'+id).textContent = '';
  document.getElementById('err-csv-'+id).textContent = '';
  const s = document.getElementById('status-'+id);
  s.textContent = 'no data'; s.className = 'block-status';
  document.getElementById('block-'+id).classList.remove('loaded');
  updateBtn();
}

function updateBtn() {
  const hasData = Object.keys(loadedData).length > 0;
  document.getElementById('analyzeBtn').disabled = !hasData;
  document.getElementById('startOverBtn').style.display = hasData ? 'block' : 'none';
}

function startOver() {
  // Clear all loaded data
  loadedData = {};
  window._spending = [];
  window._credits = [];

  // Reset each card slot
  CARDS.forEach(card => {
    const id = card.id;
    const ta = document.getElementById('ta-'+id);
    if (ta) ta.value = '';
    document.getElementById('err-json-'+id).textContent = '';
    document.getElementById('err-csv-'+id).textContent = '';
    const s = document.getElementById('status-'+id);
    s.textContent = 'no data';
    s.className = 'block-status';
    const block = document.getElementById('block-'+id);
    block.classList.remove('loaded', 'open');
  });

  // Reset content area
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <p style="max-width:300px;line-height:1.8">Import data from one or more cards via Plaid JSON or CSV, then click Analyze.</p>
    </div>`;

  updateBtn();
}

// Analyze
function analyze() {
  let all = [];
  Object.entries(loadedData).forEach(([id, txns]) => {
    const card = CARDS.find(c => c.id===id);
    txns.forEach(tx => all.push({...tx, _card:card.label}));
  });

  const spending = all.filter(tx => tx.amount > 0 && !EXCLUDED.includes(tx.cat));
  const credits  = all.filter(tx => tx.amount < 0 && !EXCLUDED.includes(tx.cat));

  const catMap = {};
  [...spending.filter(tx => !tx.pending), ...credits].forEach(tx => {
    const c = tx.cat||'OTHER';
    if (!catMap[c]) catMap[c] = {total:0, count:0};
    catMap[c].total += tx.amount; catMap[c].count++;
  });

  // Remove any categories that netted to zero or below zero spending
  const cats = Object.entries(catMap)
    .filter(([,d]) => d.count > 0)
    .sort((a,b) => b[1].total - a[1].total);
  const maxCat = Math.max(...cats.map(([,d]) => Math.abs(d.total))) || 1;
  const grandTotal = spending.filter(tx => !tx.pending).reduce((s,t) => s+t.amount, 0)
    + credits.reduce((s,t) => s+t.amount, 0);
  const postedSpend = spending.filter(t => !t.pending);
  const pendingSpend = spending.filter(t => t.pending);
  const postedTotal = postedSpend.reduce((s,t) => s+t.amount, 0);
  const pendingTotal = pendingSpend.reduce((s,t) => s+t.amount, 0);
  const totalCredits = Math.abs(credits.reduce((s,t) => s+t.amount, 0));

  window._spending = spending;
  window._credits = credits;

  const content = document.getElementById('content');
  const cardSet = new Set(spending.map(t => t._card));
  const pending = spending.filter(t => t.pending).length;

  content.innerHTML = `<div class="results-section">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Cards</div><div class="stat-value">${cardSet.size}</div><div class="stat-sub">${[...cardSet].join(' · ')}</div></div>
      <div class="stat-card"><div class="stat-label">Total Posted Spend</div><div class="stat-value">${fmt(postedTotal)}</div><div class="stat-sub">${postedSpend.length} transactions</div></div>
      <div class="stat-card"><div class="stat-label">Credits / Refunds</div><div class="stat-value" style="color:var(--accent2)">${fmt(totalCredits)}</div><div class="stat-sub">${credits.length} transaction${credits.length!==1?'s':''}</div></div>
      <div class="stat-card"><div class="stat-label">Total Net Spend</div><div class="stat-value" style="color:var(--text)">${fmt(postedTotal - totalCredits)}</div><div class="stat-sub">posted minus refunds</div></div>
      <div class="stat-card"><div class="stat-label">Total Pending Spend</div><div class="stat-value" style="color:var(--warn)">${fmt(pendingTotal)}</div><div class="stat-sub">${pendingSpend.length} transactions</div></div>
    </div>
    <div class="categories">
      <div class="section-title">Spending by Category — posted only · click to filter${pendingSpend.length ? ` <span style="font-weight:400;font-size:10px;color:var(--warn);letter-spacing:0">(${pendingSpend.length} pending transaction${pendingSpend.length!==1?'s':''} excluded)</span>` : ''}</div>
      ${cats.map(([cat,d]) => {
        // Build sub-category breakdown
        const allTx = [...spending.filter(tx => !tx.pending), ...credits];
        const subMap = {};
        allTx.filter(tx => tx.cat===cat && tx.cat_detail).forEach(tx => {
          if (!subMap[tx.cat_detail]) subMap[tx.cat_detail] = {total:0, count:0};
          subMap[tx.cat_detail].total += tx.amount;
          subMap[tx.cat_detail].count++;
        });
        const subs = Object.entries(subMap).sort((a,b) => b[1].total - a[1].total);
        const maxSub = subs[0]?.[1].total || 1;
        const color = CAT_COLORS[cat]||'#6b6b75';
        const subPanel = subs.length > 0 ? `
          <div class="subcat-panel" id="subcat-${cat}">
            ${subs.map(([detail, sd]) => `
              <div class="subcat-row" onclick="event.stopPropagation();setSubFilter('${cat}','${detail}')">
                <div class="subcat-name">${fmtDetail(detail)}</div>
                <div class="cat-bar-wrap"><div class="cat-bar" style="width:${(Math.abs(sd.total)/Math.abs(maxSub)*100).toFixed(1)}%;background:${color};opacity:0.6"></div></div>
                <div class="subcat-total" style="color:${color}">${fmt(sd.total)}</div>
                <div class="subcat-count">${sd.count} txn${sd.count!==1?'s':''}</div>
              </div>`).join('')}
          </div>` : '';
        return `
        <div class="category-row" onclick="setFilter('${cat}')">
          <div class="cat-name" style="color:${color}">${fmtCat(cat)}${subs.length > 0 ? ' <span style="font-size:9px;opacity:0.6">▶</span>' : ''}</div>
          <div class="cat-bar-wrap"><div class="cat-bar" style="width:${(d.total/maxCat*100).toFixed(1)}%;background:${color}"></div></div>
          <div class="cat-total">${fmt(d.total)}</div>
          <div class="cat-count">${d.count} txn${d.count!==1?'s':''}</div>
        </div>${subPanel}`;
      }).join('')}
      <div style="display:grid;grid-template-columns:200px 1fr 90px 80px;align-items:center;gap:16px;padding:12px 0;border-top:2px solid var(--border)">
        <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;">Total</div>
        <div></div>
        <div style="text-align:right;font-family:'DM Mono',monospace;font-size:13px;font-weight:800;">${fmt(grandTotal)}</div>
        <div style="text-align:right;color:var(--muted);font-size:11px;">${postedSpend.length + credits.length} txns</div>
      </div>
    </div>
    <div class="section-title">Transactions</div>
    <div class="table-controls">
      <input class="search-input" id="si" placeholder="Search merchant..." oninput="renderTable()">
      <select id="cf" onchange="onCatFilter()">
        <option value="">All categories</option>
        ${cats.map(([c]) => `<option value="${c}">${fmtCat(c)}</option>`).join('')}
      </select>
      <select id="df" onchange="renderTable()" style="display:none">
        <option value="">All sub-categories</option>
      </select>
      <select id="kf" onchange="renderTable()">
        <option value="">All cards</option>
        ${[...cardSet].map(c => `<option value="${c}">${c}</option>`).join('')}
      </select>
      <button id="clearBtn" onclick="clearFilters()" style="display:none;padding:7px 14px;background:transparent;border:1px solid #d0d3db;border-radius:4px;color:#6b7280;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">&#x2715; Clear filters</button>
    </div>
    <div id="tw"></div>
    <div style="color:var(--muted);font-size:10px;padding:8px 0;display:flex;gap:16px">
      <span><span class="pending-dot" style="display:inline-block;vertical-align:middle;margin-right:3px"></span> Pending transaction</span>
      <span><span class="low-confidence" style="display:inline">*</span> Low categorization confidence</span>
    </div>
  </div>`;

  renderTable();
}

function setFilter(cat) {
  const cf = document.getElementById('cf');
  const df = document.getElementById('df');
  const isAlreadySelected = cf.value === cat;

  // Toggle sub-cat panel
  document.querySelectorAll('.subcat-panel').forEach(p => {
    if (p.id === 'subcat-' + cat && !isAlreadySelected) {
      p.classList.add('open');
    } else {
      p.classList.remove('open');
    }
  });

  cf.value = isAlreadySelected ? '' : cat;
  if (df) { df.value = ''; df.style.display = 'none'; }
  if (!isAlreadySelected) onCatFilter();
  else renderTable();
}

function setSubFilter(cat, detail) {
  document.getElementById('cf').value = cat;
  onCatFilter();
  // Wait for onCatFilter to populate df, then set value
  setTimeout(() => {
    const df = document.getElementById('df');
    if (df) { df.value = detail; renderTable(); }
  }, 0);
}

function clearFilters() {
  document.getElementById('si').value = '';
  document.getElementById('cf').value = '';
  document.getElementById('kf').value = '';
  const df = document.getElementById('df');
  if (df) { df.value=''; df.style.display='none'; }
  document.querySelectorAll('.subcat-panel').forEach(p => p.classList.remove('open'));
  renderTable();
}

function onCatFilter() {
  const cf = document.getElementById('cf').value;
  const df = document.getElementById('df');
  if (!cf) {
    df.style.display = 'none';
    df.value = '';
    renderTable();
    return;
  }
  const allTx = [...(window._spending||[]), ...(window._credits||[])];
  const details = [...new Set(allTx.filter(tx => tx.cat===cf && tx.cat_detail).map(tx => tx.cat_detail))].sort();
  if (details.length > 0) {
    df.innerHTML = '<option value="">All sub-categories</option>' +
      details.map(d => `<option value="${d}">${fmtDetail(d)}</option>`).join('');
    df.style.display = 'block';
  } else {
    df.style.display = 'none';
    df.value = '';
  }
  renderTable();
}

function renderTable() {
  const q = (document.getElementById('si')?.value||'').toLowerCase();
  const cf = document.getElementById('cf')?.value||'';
  const df = document.getElementById('df')?.value||'';
  const kf = document.getElementById('kf')?.value||'';
  const clearBtn = document.getElementById('clearBtn');
  if (clearBtn) clearBtn.style.display = (q || cf || df || kf) ? 'block' : 'none';

  let rows = (window._spending||[]).filter(tx =>
    (!q || tx.merchant.toLowerCase().includes(q)) &&
    (!cf || tx.cat===cf) &&
    (!df || tx.cat_detail===df) &&
    (!kf || tx._card===kf)
  );

  const sortFn = (a,b) => {
    const av = sortCol==='date' ? a.date : sortCol==='amount' ? a.amount : a.merchant.toLowerCase();
    const bv = sortCol==='date' ? b.date : sortCol==='amount' ? b.amount : b.merchant.toLowerCase();
    return av<bv ? sortDir : av>bv ? -sortDir : 0;
  };

  const pending = rows.filter(tx => tx.pending).sort(sortFn);
  const posted  = rows.filter(tx => !tx.pending).sort(sortFn);

  const wrap = document.getElementById('tw');
  if (!wrap) return;

  if (!rows.length) { wrap.innerHTML='<div style="color:var(--muted);padding:24px 0">No transactions match.</div>'; return; }

  const sortArrow = col => sortCol===col ? (sortDir>0?'↑':'↓') : '';

  const buildTable = (txList) => `<table>
    <thead><tr>
      <th onclick="setSort('date')">Date ${sortArrow('date')}</th>
      <th onclick="setSort('merchant')">Merchant ${sortArrow('merchant')}</th>
      <th>Category</th>
      <th>Card</th>
      <th onclick="setSort('amount')" style="text-align:right">Amount ${sortArrow('amount')}</th>
    </tr></thead>
    <tbody>${txList.map(tx => {
      const color = CAT_COLORS[tx.cat]||'#6b6b75';
      const csvTag = tx.source==='csv' ? '<span style="font-size:9px;color:var(--accent2);margin-left:5px">CSV</span>' : '';
      const logoHtml = tx.logo_url ? `<img class="merchant-logo" src="${tx.logo_url}" alt="" onerror="this.classList.add('merchant-logo-placeholder');this.removeAttribute('src')">` : `<span class="merchant-logo-placeholder"></span>`;
      const channelTag = tx.payment_channel ? `<span class="channel-tag">${tx.payment_channel.replace(/_/g,' ')}</span>` : '';
      const txJson = JSON.stringify(tx).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      return `<tr onclick="openTxModal(JSON.parse(this.dataset.tx))" data-tx="${txJson}">
        <td class="td-date">${tx.date}</td>
        <td class="td-merchant" title="${tx.merchant}"><div class="merchant-cell">${logoHtml}${tx.pending?'<span class="pending-dot"></span>':''}${tx.cat_confidence==='LOW'?'<span class="low-confidence" title="Low categorization confidence">*</span>':''}<span class="merchant-name">${tx.merchant}</span>${csvTag}${channelTag}</div></td>
        <td><span class="badge" style="border-color:${color};color:${color}">${fmtCat(tx.cat)}</span>${tx.cat_detail ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;padding-left:1px">${fmtDetail(tx.cat_detail)}</div>` : ''}</td>
        <td style="color:var(--muted);font-size:11px">${tx._card}</td>
        <td class="td-amount">${fmt(tx.amount)}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;

  let html = '';

  if (pending.length) {
    html += `<div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--warn);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
      ● Pending <span style="font-weight:400;color:var(--muted)">${pending.length} transaction${pending.length!==1?'s':''}</span>
    </div>`;
    html += buildTable(pending);
    html += `<div style="display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:11px;padding:10px 0 24px"><span>${pending.length} pending transaction${pending.length!==1?'s':''}</span><span style="font-weight:700;color:var(--text)">${fmt(pending.reduce((s,t)=>s+t.amount,0))}</span></div>`;
  }

  html += `<div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
    Posted <span style="font-weight:400">${posted.length} transaction${posted.length!==1?'s':''}</span>
  </div>`;
  html += posted.length ? buildTable(posted) : '<div style="color:var(--muted);padding:16px 0">No posted transactions match.</div>';
  html += `<div style="font-size:11px;padding:10px 0"><div style="display:flex;justify-content:space-between;align-items:center;color:var(--muted);margin-bottom:2px"><span>${posted.length} posted transaction${posted.length!==1?'s':''}</span><span style="font-weight:700;color:var(--text)">${fmt(posted.reduce((s,t)=>s+t.amount,0))}</span></div><div style="color:var(--muted)">${rows.length} of ${window._spending.length} total transactions</div></div>`;

  // Credits / Refunds section
  const allCredits = (window._credits||[]).filter(tx =>
    (!q || tx.merchant.toLowerCase().includes(q)) &&
    (!cf || tx.cat===cf) &&
    (!df || tx.cat_detail===df) &&
    (!kf || tx._card===kf)
  ).sort(sortFn);

  if (allCredits.length) {
    html += `<div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-top:32px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
      Credits / Refunds <span style="font-weight:400;color:var(--muted)">${allCredits.length} transaction${allCredits.length!==1?'s':''}</span>
    </div>`;
    html += `<table>
    <thead><tr>
      <th onclick="setSort('date')">Date ${sortArrow('date')}</th>
      <th onclick="setSort('merchant')">Merchant ${sortArrow('merchant')}</th>
      <th>Category</th>
      <th>Card</th>
      <th onclick="setSort('amount')" style="text-align:right">Amount ${sortArrow('amount')}</th>
    </tr></thead>
    <tbody>${allCredits.map(tx => {
      const color = CAT_COLORS[tx.cat]||'#6b6b75';
      const csvTag = tx.source==='csv' ? '<span style="font-size:9px;color:var(--accent2);margin-left:5px">CSV</span>' : '';
      const logoHtml = tx.logo_url ? `<img class="merchant-logo" src="${tx.logo_url}" alt="" onerror="this.classList.add('merchant-logo-placeholder');this.removeAttribute('src')">` : `<span class="merchant-logo-placeholder"></span>`;
      const channelTag = tx.payment_channel ? `<span class="channel-tag">${tx.payment_channel.replace(/_/g,' ')}</span>` : '';
      const txJson = JSON.stringify(tx).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      return `<tr onclick="openTxModal(JSON.parse(this.dataset.tx))" data-tx="${txJson}">
        <td class="td-date">${tx.date}</td>
        <td class="td-merchant" title="${tx.merchant}"><div class="merchant-cell">${logoHtml}<span class="merchant-name">${tx.merchant}</span>${csvTag}${tx.cat_confidence==='LOW'?'<span class="low-confidence" title="Low categorization confidence">*</span>':''}${channelTag}</div></td>
        <td><span class="badge" style="border-color:${color};color:${color}">${fmtCat(tx.cat)}</span>${tx.cat_detail ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;padding-left:1px">${fmtDetail(tx.cat_detail)}</div>` : ''}</td>
        <td style="color:var(--muted);font-size:11px">${tx._card}</td>
        <td class="td-amount" style="color:var(--accent2)">-${fmt(Math.abs(tx.amount))}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>
  <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:10px 0"><span style="color:var(--muted)">${allCredits.length} refund${allCredits.length!==1?'s':''}</span><span style="font-weight:700;color:var(--accent2)">${fmt(allCredits.reduce((s,t)=>s+Math.abs(t.amount),0))} credited</span></div>`;
  }

  wrap.innerHTML = html;
}

function setSort(col) {
  sortDir = sortCol===col ? sortDir*-1 : -1;
  sortCol = col;
  renderTable();
}

function fmt(n) { return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtCat(c) { return (c||'OTHER').replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase()); }
function fmtDetail(d) {
  if (!d) return '';
  // Map of primary category prefixes to strip
  const prefixes = [
    'FOOD_AND_DRINK','GENERAL_MERCHANDISE','GENERAL_SERVICES',
    'RENT_AND_UTILITIES','HOME_IMPROVEMENT','PERSONAL_CARE',
    'GOVERNMENT_AND_NON_PROFIT','LOAN_PAYMENTS','ENTERTAINMENT',
    'TRANSPORTATION','MEDICAL','TRAVEL','INCOME','OTHER',
  ];
  for (const p of prefixes) {
    if (d.startsWith(p + '_')) {
      const stripped = d.slice(p.length + 1);
      return stripped.replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase());
    }
  }
  return d.replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase());
}

// ── Transaction detail modal ────────────────────────────────────────────────
function openTxModal(tx) {
  const isCredit = tx.amount < 0;
  const color = CAT_COLORS[tx.cat] || '#6b6b75';

  // Header: logo + merchant name + amount
  const logoHtml = tx.logo_url
    ? `<img class="tx-modal-logo" src="${tx.logo_url}" alt="" onerror="this.src='';this.style.background='var(--surface)'">`
    : `<div class="tx-modal-logo-placeholder"></div>`;

  const amountHtml = `<div class="tx-modal-amount${isCredit ? ' credit' : ''}">
    ${isCredit ? '-' : ''}${fmt(Math.abs(tx.amount))}
    ${tx.pending ? '<span class="tx-modal-pending"><span class="pending-dot"></span>Pending</span>' : ''}
  </div>`;

  // Helper to build a label/value row, skipping empty values
  const row = (label, value) => value
    ? `<div class="tx-modal-row"><span class="tx-modal-label">${label}</span><span class="tx-modal-value">${value}</span></div>`
    : '';

  // Category section
  const catSection = `
    <div class="tx-modal-section">
      <div class="tx-modal-section-title">Category</div>
      ${row('Primary', `<span class="tx-modal-badge" style="border-color:${color};color:${color}">${fmtCat(tx.cat)}</span>`)}
      ${row('Detail', tx.cat_detail ? fmtDetail(tx.cat_detail) : '')}
      ${row('Confidence', tx.cat_confidence ? fmtCat(tx.cat_confidence) : '')}
    </div>`;

  // Payment section
  const channelFmt = tx.payment_channel ? tx.payment_channel.replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase()) : '';
  const websiteHtml = tx.website ? `<a href="${tx.website}" target="_blank" rel="noopener">${tx.website.replace(/^https?:\/\//,'')}</a>` : '';
  const paymentSection = `
    <div class="tx-modal-section">
      <div class="tx-modal-section-title">Payment</div>
      ${row('Card', tx._card || '')}
      ${row('Channel', channelFmt)}
      ${row('Website', websiteHtml)}
    </div>`;

  // Dates section
  const dateSection = `
    <div class="tx-modal-section">
      <div class="tx-modal-section-title">Dates</div>
      ${row('Posted', tx.date)}
      ${row('Datetime', tx.datetime ? tx.datetime.replace('T',' ').replace('Z',' UTC') : '')}
      ${row('Authorized date', tx.authorized_date || '')}
      ${row('Authorized datetime', tx.authorized_datetime ? tx.authorized_datetime.replace('T',' ').replace('Z',' UTC') : '')}
    </div>`;

  // Location section
  let locationSection = '';
  if (tx.location && Object.values(tx.location).some(v => v)) {
    const loc = tx.location;
    const addrParts = [loc.address, loc.city, loc.region, loc.postal_code, loc.country].filter(Boolean);
    const mapsUrl = (loc.lat && loc.lon)
      ? `https://www.google.com/maps?q=${loc.lat},${loc.lon}`
      : addrParts.length ? `https://www.google.com/maps/search/${encodeURIComponent(addrParts.join(', '))}` : '';
    const addrHtml = addrParts.length
      ? (mapsUrl ? `<a href="${mapsUrl}" target="_blank" rel="noopener">${addrParts.join(', ')}</a>` : addrParts.join(', '))
      : '';
    const coordsHtml = (loc.lat && loc.lon) ? `${loc.lat}, ${loc.lon}` : '';
    locationSection = `
      <div class="tx-modal-section">
        <div class="tx-modal-section-title">Location</div>
        ${row('Address', addrHtml)}
        ${row('Store number', loc.store_number || '')}
        ${row('Coordinates', coordsHtml)}
      </div>`;
  }

  // Counterparties section
  let counterpartySection = '';
  if (tx.counterparty && tx.counterparty.length) {
    const cpRows = tx.counterparty.map(cp => {
      const cpLogo = cp.logo_url
        ? `<img class="tx-modal-cp-logo" src="${cp.logo_url}" alt="" onerror="this.src='';this.style.background='var(--surface)'">`
        : `<div class="tx-modal-cp-logo" style="background:var(--surface)"></div>`;
      const cpType = cp.type ? cp.type.replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase()) : '';
      return `<div class="tx-modal-counterparty">
        ${cpLogo}
        <div class="tx-modal-cp-info">
          <div class="tx-modal-cp-name">${cp.name || '—'}</div>
          ${cpType ? `<div class="tx-modal-cp-type">${cpType}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    counterpartySection = `
      <div class="tx-modal-section">
        <div class="tx-modal-section-title">Counterpart${tx.counterparty.length > 1 ? 'ies' : 'y'}</div>
        ${cpRows}
      </div>`;
  }

  // IDs section
  const idsSection = `
    <div class="tx-modal-section">
      <div class="tx-modal-section-title">Reference</div>
      ${row('Transaction ID', tx.transaction_id ? `<span style="font-size:10px;word-break:break-all">${tx.transaction_id}</span>` : '')}
      ${row('Account ID', tx.account_id ? `<span style="font-size:10px;word-break:break-all">${tx.account_id}</span>` : '')}
    </div>`;

  document.getElementById('tx-modal-body').innerHTML = `
    <div class="tx-modal-header">
      ${logoHtml}
      <div class="tx-modal-title">
        <div class="tx-modal-merchant">${tx.merchant}</div>
        ${amountHtml}
      </div>
    </div>
    <div class="tx-modal-body">
      ${catSection}
      ${paymentSection}
      ${dateSection}
      ${locationSection}
      ${counterpartySection}
      ${idsSection}
    </div>`;

  document.getElementById('tx-modal-overlay').style.display = 'block';
  document.getElementById('tx-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeTxModal() {
  document.getElementById('tx-modal-overlay').style.display = 'none';
  document.getElementById('tx-modal').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTxModal(); });
</script>

<!-- Transaction detail modal -->
<div id="tx-modal-overlay" onclick="closeTxModal()" style="display:none"></div>
<div id="tx-modal" role="dialog" aria-modal="true" style="display:none">
  <div id="tx-modal-inner">
    <button class="tx-modal-close" onclick="closeTxModal()" aria-label="Close">&times;</button>
    <div id="tx-modal-body"></div>
  </div>
</div>
</body>
</html>
